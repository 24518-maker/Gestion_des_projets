
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}{% endblock %}</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 200px;                   /* ثابت */
      height: 100vh;                  /* يغطي طول الشاشة */
      position: fixed;                /* Sidebar ثابت */
      top: 0;
      left: 0;
      padding: 20px;
      background: linear-gradient(180deg,#A8E6CF, #56CFE1);
      color: white;
      overflow-y: auto;
      z-index: 1000;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      transition: 0.3s;
    }

    .sidebar a:hover {
      background: rgba(255,255,255,0.2);
    }

    /* ===== CONTENT ===== */
    .content {
      margin-left: 250px;             /* نفس عرض Sidebar */
      width: calc(100% - 200px);      /* باقي الشاشة */
      padding: 20px;
      min-height: 100vh;              /* يغطي طول الشاشة */
      box-sizing: border-box;
      overflow-y: auto;               /* Scroll عمودي */
      overflow-x: hidden;             /* منع التمرير يمين/يسار */
      background: #f4f6f9;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2>📊 Dashboard</h2>

    <a href="{{ url_for('dashboard') }}">🏠 Tableau de Bord</a>
    <a href="{{ url_for('projets_page') }}">📁 Projets</a>
    <a href="{{ url_for('groupes_page') }}">👥 Groupes</a>
    <a href="{{ url_for('etapes_page') }}">📝 Étapes</a>
  <a href="{{ url_for('evaluations_page') }}">🗒️ Évaluations</a>
    <a href="{{ url_for('livrables_encadrant') }}">📂 Livrables</a>
    <a href="{{ url_for('logout') }}">🚪 Déconnexion</a>
  </div>

  <div class="content">
    {% block content %}{% endblock %}
  </div>

</body>
</html>
