{% extends "base.html" %}
{% block title %}Groupes{% endblock %}

{% block content %}
<h2>👥 Groupes</h2>

<a href="{{ url_for('add_groupe_page') }}" style="padding:8px 12px;background:#4CAF50;color:white;border-radius:6px;text-decoration:none;">➕ Ajouter Groupe</a>

<table style="width:100%;border-collapse:collapse;margin-top:15px;">
  <thead>
    <tr style="background:#e9eef6;">
      <th>Nom Groupe</th>
      <th>Projet</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for groupe in groupes %}
    <tr style="border-bottom:1px solid #ddd;">
      <td>{{ groupe.nom_groupe }}</td>
      <td>{{ groupe.nom_projet }}</td>
      <td>
        <a href="{{ url_for('update_groupe_page', Id_group=groupe.Id_group) }}">✏️ Edit</a> |
        <a href="{{ url_for('delete_groupe_page', Id_group=groupe.Id_group) }}">🗑️ Delete</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
