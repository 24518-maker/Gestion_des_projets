 <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style2.css') }}">
</head>
<body>
  <div class="login-container">
    <h1>Connectez-vous</h1>
    <p>Entrez vos informations pour accéder à la plateforme</p>

    <form action="{{url_for('login')}}" method="post" class="login-form">
      <input type="text" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Mot de passe" required>
      <button type="submit" class="btn-main">Se connecter</button>
    </form>

    <a href="/forget_password" class="forget_link">Mot de passe oublié ?</a>
  </div>
</body>
</html>
